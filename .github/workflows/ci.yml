name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Go API ─────────────────────────────────────────────────────
  api:
    name: API (Go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: api/common/go.sum

      - name: Download modules
        working-directory: api/common
        run: go mod download

      - name: Vet
        working-directory: api/common
        run: go vet ./...

      - name: Build
        working-directory: api/common
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /dev/null ./cmd/server

  # ── Next.js Web ────────────────────────────────────────────────
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build   # Next.js build runs tsc type-checking internally
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

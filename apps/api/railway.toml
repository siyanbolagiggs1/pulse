# Railway configuration for the Pulse API.
# Import this project at railway.app, then set the required environment variables
# in the Railway dashboard under Variables.
#
# Required variables to set in Railway dashboard:
#   MONGODB_URI
#   REDIS_URL
#   JWT_ACCESS_SECRET
#   JWT_REFRESH_SECRET
#   PAYSTACK_SECRET_KEY
#   PAYSTACK_PUBLIC_KEY
#   PAYSTACK_CURRENCY       (e.g. NGN)
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_FROM
#   CLIENT_URL              (e.g. https://your-app.vercel.app)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.envVars]]
PORT = "5000"
NODE_ENV = "production"
DB_NAME = "pulse"
UPLOAD_DIR = "/app/uploads"
PLATFORM_COMMISSION_RATE = "0.20"
JWT_ACCESS_EXPIRY_MINUTES = "15"
JWT_REFRESH_EXPIRY_DAYS = "7"
